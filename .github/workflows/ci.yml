name: CI

# 언제 실행되는지 설정 -> main 브랜치로 PR 올릴 때마다 실행
on:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: 빌드 및 테스트
    runs-on: ubuntu-latest

    # CI에서 local 프로필로 빌드와 Spring 기동 여부를 확인하기 위한 임시 MySQL이다.
    # 운영 RDS가 아니며, GitHub Actions 실행이 끝나면 컨테이너와 데이터는 함께 사라진다.
    # application-local.yml이 localhost:3307/korailtalk을 바라보므로 같은 접속 조건으로 맞춘다.
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: korailtalk
          MYSQL_USER: korail
          MYSQL_PASSWORD: korail1234
        ports:
          - 3307:3306

        # MySQL이 완전히 뜰 때까지 기다리는 옵션 (없으면 오류 발생할수도 있음)
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      # 코드를 GitHub Actions 서버로 가져옴
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # Java 21 설치
      - name: Java 21 설치
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # build.gradle 의존성 캐시
      - name: Gradle 캐시 복원
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # local 프로필로 빌드+테스트 실행
      - name: Gradle 실행 권한 부여
        run: |
          echo "=== CI: Gradle Wrapper 실행 권한 부여 ==="
          chmod +x gradlew

      - name: 빌드 및 테스트 실행
        run: |
          echo "=== CI: 빌드 및 테스트 시작 ==="
          echo "CI 목적: local 프로필 기준으로 컴파일, 테스트, Spring 기동 가능 여부를 확인합니다."
          echo "CI DB: GitHub Actions 안에서만 생성되는 임시 MySQL이며 운영 RDS가 아닙니다."
          echo "실행 명령어: ./gradlew build --no-daemon"
          echo "Spring profile: $SPRING_PROFILES_ACTIVE"
          ./gradlew build --no-daemon
          echo "=== CI: 빌드 및 테스트 완료 ==="
        env:
          SPRING_PROFILES_ACTIVE: local
