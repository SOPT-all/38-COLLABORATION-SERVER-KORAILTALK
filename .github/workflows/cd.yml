name: CD

# main에 push(merge)될 때마다 자동 실행
on:
  push:
    branches: [ main ]

# 환경변수 선언 -> 이미지 이름을 변수로 선언
env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/korailtalk-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # build-and-push job에서 만든 이미지 태그를 deploy job에서도 쓸 수 있게 넘겨주는것
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      # Docker Hub 로그인 (secrets는 깃헙 레포 설정에 저장해둔 환경변수)
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 이미지 태그 생성 -> 어느 커밋이 배포됐는지 추적 가능, latest = 항상 최신 이미지 사용
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      # Dockerfile로 이미지 빌드 후 Docker Hub에 push
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # build-and-push가 성공해야 실행됨
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # EC2에 SSH 접속 후 명령어 실행
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 이미지 받아오기
            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/korailtalk-server:latest"
            docker pull $IMAGE

            docker stop korailtalk-new 2>/dev/null || true
            docker rm korailtalk-new 2>/dev/null || true
            
            # 새 컨테이너를 8081 포트에 먼저 실행
            docker run -d --name korailtalk-new --network host \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e SERVER_PORT=8081 \
              -e DB_URL="${{ secrets.DB_URL }}" \
              -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              $IMAGE

            # 최대 60초 동안 헬스체크 (5초 간격 x 12회)
            for i in $(seq 1 12); do
              # if curl -sf http://localhost:8081/health; then
              #   echo "Health check passed"
              #   break
              echo "=== Health check attempt $i ==="     
              RESULT=$(curl -sv http://localhost:8081/health 2>&1)
              echo "curl exit code: $?"
              echo "curl result: $RESULT"
              if echo "$RESULT" | grep -q '"status":"UP"'; then
                echo "Health check passed"
                break
              fi
              sleep 5
              if [ $i -eq 12 ]; then
                docker stop korailtalk-new && docker rm korailtalk-new
                exit 1
              fi
            done

            # 헬스체크 통과 후 기존 컨테이너(8080에서 실행중이던 구버전) 제거
            docker stop korailtalk-app 2>/dev/null || true
            docker rm korailtalk-app 2>/dev/null || true
            docker stop korailtalk-new && docker rm korailtalk-new

            # 새 컨테이너를 8080으로 재시작
            docker run -d --name korailtalk-app --network host \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DB_URL="${{ secrets.DB_URL }}" \
              -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              $IMAGE

            # 안쓰는 이미지 정리
            docker image prune -f
