services:
  mysql:
    image: mysql:8.4
    container_name: korailtalk-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: korailtalk
      MYSQL_USER: korail
      MYSQL_PASSWORD: korail1234
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:

#실행 방법
# 1. Docker Compose 파일이 있는 디렉토리로 이동
# 2. 다음 명령어를 실행하여 컨테이너 시작
#    docker-compose up -d
# 3. MySQL 컨테이너가 실행 중인지 확인
#    docker ps
# 4. MySQL 클라이언트 또는 애플리케이션에서 다음 정보로 데이터베이스에 연결
#    호스트: localhost
#    포트: 3307
#    사용자명: korail
#    비밀번호: korail1234
# 5. 컨테이너를 중지하려면 다음 명령어 실행
#    docker-compose down
# 6. 데이터 유지 및 삭제
#    - 데이터 유지: docker-compose down (컨테이너만 중지)
#    - 데이터 삭제: docker-compose down -v (컨테이너와 볼륨 모두 삭제)
